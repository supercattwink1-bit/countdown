
<style>
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(600px) rotate(360deg); opacity: 0; }
  }
  @keyframes twinkle {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  @keyframes firework {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(1.5); opacity: 0; }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .snowflake {
    position: absolute;
    pointer-events: none;
    animation: fall linear forwards;
    font-size: 18px;
    user-select: none;
  }
  .digit-box {
    background: rgba(255,255,255,0.07);
    border: 0.5px solid rgba(255,255,255,0.18);
    border-radius: 14px;
    padding: 14px 18px 10px;
    min-width: 72px;
    text-align: center;
    backdrop-filter: blur(4px);
    transition: transform 0.15s;
  }
  .digit-box:hover { transform: scale(1.05); }
  .digit-num {
    font-size: 40px;
    font-weight: 500;
    color: #fff;
    line-height: 1;
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
    font-family: var(--font-mono);
  }
  .digit-label {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .sep {
    font-size: 32px;
    color: rgba(255,255,255,0.4);
    font-weight: 300;
    margin-bottom: 14px;
  }
  .wish-bubble {
    animation: slideIn 0.4s ease;
  }
  .star-btn {
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 999px;
    padding: 9px 20px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    font-family: var(--font-sans);
  }
  .star-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.03); }
  .star-btn:active { transform: scale(0.97); }
  .firework-ring {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: firework 0.7s ease-out forwards;
  }
  .light {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    animation: twinkle ease-in-out infinite;
  }
  body{
    margin: 0;
  }
  .sr-only{
    color: white;
  }
</style>

<div id="root" style="background: linear-gradient(160deg, #0a0a1a 0%, #0d1b3e 50%, #0a1a0a 100%); min-height: 1000px; position: relative; overflow: hidden; border-radius: var(--border-radius-lg); padding: 32px 20px 28px; display: flex; flex-direction: column; align-items: center; gap: 0;">
  <h2 class="sr-only">Новогодний таймер обратного отсчёта</h2>

  <!-- Garland -->
  <div style="position: absolute; top: 0; left: 0; width: 100%; display: flex; justify-content: space-around; padding: 0 8px;">
    <svg width="100%" height="44" viewBox="0 0 680 44" xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;" aria-hidden="true">
      <path d="M0 6 Q85 36 170 6 Q255 36 340 6 Q425 36 510 6 Q595 36 680 6" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    </svg>
    <script>
      (function(){
        const colors = ['#ff4444','#ffcc00','#44ff88','#4488ff','#ff88cc','#ff8844'];
        const container = document.querySelector('#root > div');
        const svg = container.querySelector('svg');
        const positions = [0,1/6,2/6,3/6,4/6,5/6,1].map(t => ({
          x: t * 680,
          y: 6 + Math.sin(t * Math.PI * 6) * 15
        }));
        positions.forEach((p, i) => {
          const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          c.setAttribute('cx', p.x);
          c.setAttribute('cy', p.y + 18);
          c.setAttribute('r', '5');
          c.setAttribute('fill', colors[i % colors.length]);
          c.style.animation = `twinkle ${1.5 + i * 0.3}s ease-in-out infinite`;
          svg.appendChild(c);
        });
      })();
    </script>
  </div>

  <!-- Title -->
  <div style="margin-top: 40px; margin-bottom: 6px; text-align: center;">
    <div style="font-size: 13px; color: rgba(255,255,255,0.45); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px;">до нового года</div>
    <div id="year-display" style="font-size: 52px; font-weight: 500; color: #fff; line-height: 1; letter-spacing: -1px;"></div>
  </div>

  <!-- Countdown -->
  <div style="display: flex; align-items: center; gap: 8px; margin: 24px 0 28px; flex-wrap: wrap; justify-content: center;">
    <div class="digit-box"><div class="digit-num" id="dd">000</div><div class="digit-label">дней</div></div>
    <div class="sep">:</div>
    <div class="digit-box"><div class="digit-num" id="hh">00</div><div class="digit-label">часов</div></div>
    <div class="sep">:</div>
    <div class="digit-box"><div class="digit-num" id="mm">00</div><div class="digit-label">минут</div></div>
    <div class="sep">:</div>
    <div class="digit-box"><div class="digit-num" id="ss">00</div><div class="digit-label">секунд</div></div>
  </div>

  <!-- Wish display -->
  <div id="wish-area" style="min-height: 40px; text-align: center; margin-bottom: 16px;">
    <div id="wish-text" class="wish-bubble" style="font-size: 15px; color: rgba(255,255,255,0.75); font-style: italic;"></div>
  </div>

  <!-- Buttons -->
  <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
    <button class="star-btn" onclick="makeSnow()">❄️ Снег</button>
    <button class="star-btn" onclick="launchFirework()">🎆 Фейерверк</button>
    <button class="star-btn" onclick="showWish()">🎁 Пожелание</button>
    <button class="star-btn" onclick="toggleTree()">🎄 Ёлка</button>
  </div>

  <!-- Mini tree (hidden initially) -->
  <div id="tree-wrap" style="display:none; margin-top: 20px; transition: opacity 0.3s;">
    <svg width="120" height="130" viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg" aria-label="Ёлка" role="img">
      <polygon points="60,8 20,55 45,55 10,95 38,95 28,115 92,115 82,95 110,95 75,55 100,55" fill="#1a5c2a"/>
      <rect x="49" y="115" width="22" height="12" fill="#7a4a1a" rx="2"/>
      <circle cx="42" cy="45" r="4" fill="#ff4444"/>
      <circle cx="75" cy="55" r="4" fill="#ffcc00"/>
      <circle cx="35" cy="78" r="4" fill="#44aaff"/>
      <circle cx="85" cy="82" r="4" fill="#ff88cc"/>
      <circle cx="55" cy="90" r="4" fill="#88ff44"/>
      <polygon points="60,0 63,8 57,8" fill="#ffee44"/>
    </svg>
  </div>
</div>

<script>
  const wishes = [
    "Пусть новый год принесёт радость и новые открытия ✨",
    "Желаю тепла, любви и исполнения мечт 🌟",
    "Пусть каждый день будет лучше предыдущего 🎊",
    "Здоровья, счастья и незабываемых моментов 💫",
    "Пусть удача будет рядом весь год 🍀",
    "Новый год — новые возможности и победы 🚀",
  ];

  function getNextNewYear() {
    const now = new Date();
    const ny = new Date(now.getFullYear() + 1, 0, 1, 0, 0, 0);
    return ny;
  }

  function pad(n, len) {
    return String(n).padStart(len, '0');
  }

  function tick() {
    const now = new Date();
    const target = getNextNewYear();
    const diff = target - now;
    const nextYear = target.getFullYear();
    document.getElementById('year-display').textContent = nextYear;
    if (diff <= 0) {
      document.getElementById('dd').textContent = '000';
      document.getElementById('hh').textContent = '00';
      document.getElementById('mm').textContent = '00';
      document.getElementById('ss').textContent = '00';
      return;
    }
    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    document.getElementById('dd').textContent = pad(days, 3);
    document.getElementById('hh').textContent = pad(hours, 2);
    document.getElementById('mm').textContent = pad(mins, 2);
    document.getElementById('ss').textContent = pad(secs, 2);
  }

  function makeSnow() {
    const root = document.getElementById('root');
    const flakes = ['❄','❅','❆','✦','·'];
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div');
      el.className = 'snowflake';
      el.textContent = flakes[Math.floor(Math.random() * flakes.length)];
      el.style.left = (Math.random() * 95) + '%';
      el.style.top = '-20px';
      el.style.fontSize = (12 + Math.random() * 14) + 'px';
      el.style.opacity = 0.7 + Math.random() * 0.3;
      el.style.animationDuration = (2.5 + Math.random() * 3) + 's';
      el.style.animationDelay = (Math.random() * 1.2) + 's';
      root.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  function launchFirework() {
    const root = document.getElementById('root');
    const colors = ['#ff4444','#ffcc00','#44ff88','#4488ff','#ff88cc','#fff'];
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        const ring = document.createElement('div');
        ring.className = 'firework-ring';
        const size = 60 + Math.random() * 80;
        ring.style.width = size + 'px';
        ring.style.height = size + 'px';
        ring.style.border = '3px solid ' + colors[Math.floor(Math.random() * colors.length)];
        ring.style.left = (15 + Math.random() * 65) + '%';
        ring.style.top = (10 + Math.random() * 50) + '%';
        root.appendChild(ring);
        ring.addEventListener('animationend', () => ring.remove());
      }, i * 120);
    }
  }

  function showWish() {
    const el = document.getElementById('wish-text');
    const w = wishes[Math.floor(Math.random() * wishes.length)];
    el.style.animation = 'none';
    void el.offsetWidth;
    el.textContent = w;
    el.style.animation = 'slideIn 0.4s ease';
  }

  let treeVisible = false;
  function toggleTree() {
    const wrap = document.getElementById('tree-wrap');
    treeVisible = !treeVisible;
    wrap.style.display = treeVisible ? 'block' : 'none';
  }

  tick();
  setInterval(tick, 1000);
  showWish();
</script>
